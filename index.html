<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <button onclick="gerarTabuada()"> Gerar Tabuada</button>
    <div id="painel"></div>

    <script>
        function gerarTabuada(){
            let painel = document.getElementById("painel");
            let conteudo = "";

            for(let i = 1; i <=10; i++){
                conteudo += ` <div class="card">`;
                conteudo += `<h3> tabuada do ${i}</h3>`;

            for(let j = 1; j <=10; j++){
                let resultado = i * j;
                conteudo += ` ${i} x ${j} = ${resultado} <br>`;
            }
            conteudo += ` </div>`;
            painel.innerHTML = conteudo;
            
            }
        }
    </script>
</body>
</html>
